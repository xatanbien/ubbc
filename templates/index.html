<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>UBBC XÃ TÂN BIÊN - TỔNG QUAN</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f2f6ff;
      margin: 0;
      padding: 0;
    }
    .header {
      background-color: #b30000;
      color: white;
      padding: 12px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }
    .update {
      text-align: center;
      color: #555;
      font-size: 14px;
      margin-bottom: 10px;
    }
    .summary {
      text-align: center;
      font-size: 16px;
      margin-bottom: 20px;
    }
    .dashboard {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding-bottom: 30px;
    }
    .chart-box {
      background: white;
      border-radius: 8px;
      box-shadow: 0 0 8px rgba(0,0,0,0.1);
      width: 300px;
      height: 300px;
      text-align: center;
      padding: 10px;
    }
    canvas {
      width: 100% !important;
      height: 80% !important;
    }
  </style>
</head>
<body>
  <div class="header">UBBC XÃ TÂN BIÊN - TIẾN ĐỘ BỎ PHIẾU</div>
  <div class="update">Cập nhật: {{ cap_nhat }}</div>
  <div class="summary">
    <b>Tổng toàn xã:</b> Đã bầu {{ da_bau }}/{{ tong }} ({{ ty_le }}%)<br>
    Còn lại: {{ con_lai }}/{{ tong }} ({{ 100 - ty_le }}%)
  </div>

  <div class="dashboard">
    {% for kv in data %}
    <div class="chart-box">
      <canvas id="chart_{{ loop.index }}"></canvas>
      <div><b>{{ kv.khu_vuc }}</b><br>
      Đã bầu: {{ kv.da_bau }}/{{ kv.tong }} ({{ kv.ty_le }}%)</div>
    </div>
    {% endfor %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    {% for kv in data %}
      const ctx{{ loop.index }} = document.getElementById('chart_{{ loop.index }}');
      new Chart(ctx{{ loop.index }}, {
        type: 'doughnut',
        data: {
          labels: ['Đã bầu', 'Còn lại'],
          datasets: [{
            data: [{{ kv.da_bau }}, {{ kv.con_lai }}],
            backgroundColor: ['#0074D9', '#FF4136']
          }]
        },
        options: {
          plugins: { legend: { display: false } },
          cutout: '60%'
        }
      });
    {% endfor %}
  </script>
</body>
</html>
